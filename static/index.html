<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtext AI - macOS Settings Edition</title>
    <style>
        :root {
            --bg-dark: #121217;
            --window-bg: rgba(28, 28, 32, 0.85);
            --card-bg: rgba(255, 255, 255, 0.025);
            --border-light: rgba(255, 255, 255, 0.07);
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --text-muted: rgba(255, 255, 255, 0.3);
            
            /* macOS System Colors */
            --mac-blue: #0a84ff;
            --mac-green: #30d158;
            --mac-yellow: #ffd60a;
            --mac-orange: #ff9f0a;
            --mac-red: #ff453a;
            --mac-purple: #bf5af2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Police système Apple appliquée explicitement à tout le document */
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        /* Ambient background glow */
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(160px);
            z-index: -1;
            opacity: 0.18;
            pointer-events: none;
        }

        .glow-1 {
            width: 600px;
            height: 600px;
            background: var(--mac-blue);
            top: -10%;
            left: 10%;
        }

        .glow-2 {
            width: 500px;
            height: 500px;
            background: var(--mac-purple);
            bottom: -10%;
            right: 10%;
        }

        /* macOS Window Container */
        .window {
            background: var(--window-bg);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            width: 100%;
            max-width: 700px;
            /* Hauteur dynamique : taille de référence en V1 via min-height, puis
               le conteneur s'allonge gracieusement vers le bas au fil des blocs
               d'analyse ajoutés en JS. Aucune barre de défilement interne. */
            height: auto;
            min-height: 400px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 0, 0, 0.4);
            z-index: 10;
            /* hidden = clipping des coins arrondis, sans jamais générer de
               barre de défilement (la hauteur suit le contenu). */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* macOS Titlebar */
        .titlebar {
            height: 48px;
            background: rgba(0, 0, 0, 0.15);
            border-bottom: 1px solid rgba(0, 0, 0, 0.2);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .window-controls {
            display: flex;
            gap: 8px;
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: relative;
        }

        .dot-close { background-color: var(--mac-red); }
        .dot-minimize { background-color: var(--mac-yellow); }
        .dot-zoom { background-color: var(--mac-green); }

        .window-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.1px;
        }

        /* Window Content */
        .content {
            padding: 30px;
        }

        /* Header block */
        header {
            margin-bottom: 25px;
            text-align: left;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.4px;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Drag & Drop Area */
        .drop-zone {
            border: 1px dashed rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 35px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.01);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-bottom: 25px;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--mac-blue);
            background: rgba(10, 132, 255, 0.05);
        }

        .drop-zone-icon {
            width: 38px;
            height: 38px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            transition: color 0.2s;
        }

        .drop-zone:hover .drop-zone-icon, .drop-zone.dragover .drop-zone-icon {
            color: var(--mac-blue);
        }

        .drop-zone-text {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .drop-zone-subtext {
            font-size: 11.5px;
            color: var(--text-secondary);
        }

        #file-input {
            display: none;
        }

        /* Loader */
        .loader {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 0;
            text-align: center;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--mac-blue);
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Container of Cards */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Elegant Analysis Card */
        .analysis-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 26px;
            animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .analysis-card:hover {
            background: rgba(255, 255, 255, 0.045);
            border-color: rgba(255, 255, 255, 0.12);
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .emotion-text {
            font-size: 11.5px;
            color: var(--text-secondary);
            text-transform: capitalize;
        }

        /* Manipulation Badge */
        .manipulation-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Rouge brique désaturé et subtil (pas d'alerte criarde) */
        .manipulation-badge.detected {
            background: rgba(150, 82, 74, 0.14);
            color: #b58178;
            border: 1px solid rgba(150, 82, 74, 0.22);
        }

        /* État neutre macOS */
        .manipulation-badge.clean {
            background: rgba(200, 200, 200, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(200, 200, 200, 0.12);
        }

        /* Tension Score Slider representation */
        .tension-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
        }

        .tension-label {
            font-size: 12px;
            color: var(--text-secondary);
            width: 60px;
            font-weight: 500;
        }

        .tension-track {
            flex-grow: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
            overflow: hidden;
        }

        .tension-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .tension-num {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
            width: 35px;
            text-align: right;
        }

        /* Badges / Dynamic Tags row */
        .badges-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 14px;
        }

        .badge-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .badge-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* Pastilles neutres au design macOS (plus de couleurs accentuées) */
        .badge-value {
            font-size: 11.5px;
            font-weight: 500;
            padding: 7px 11px;
            border-radius: 6px;
            background: rgba(200, 200, 200, 0.1);
            border: 1px solid rgba(200, 200, 200, 0.12);
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        /* Anciennes variantes colorées neutralisées (conservées pour
           compatibilité avec les classes posées par le JavaScript). */
        .badge-value.val-blue,
        .badge-value.val-purple {
            background: rgba(200, 200, 200, 0.1);
            color: var(--text-secondary);
            border-color: rgba(200, 200, 200, 0.12);
        }

        /* macOS Window Footer */
        .window-footer {
            height: 32px;
            background: rgba(0, 0, 0, 0.12);
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 11px;
            color: var(--text-muted);
            user-select: none;
        }
    </style>
</head>
<body>

    <!-- Ambient backgrounds -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="window">
        <!-- macOS Titlebar -->
        <div class="titlebar">
            <div class="window-controls">
                <div class="dot dot-close"></div>
                <div class="dot dot-minimize"></div>
                <div class="dot dot-zoom"></div>
            </div>
            <div class="window-title">Subtext AI</div>
        </div>

        <!-- Window Content -->
        <div class="content">
            <header>
                <h1>Analyse Psychologique</h1>
                <p class="subtitle">Importez un fichier de sous-titres .srt pour analyser les dynamiques relationnelles.</p>
            </header>

            <!-- Drag and Drop Area -->
            <div class="drop-zone" id="drop-zone">
                <svg class="drop-zone-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                </svg>
                <div class="drop-zone-text" id="file-name">Déposez votre fichier .srt ici</div>
                <div class="drop-zone-subtext" id="file-name-sub">ou cliquez pour parcourir les dossiers</div>
                <input type="file" id="file-input" accept=".srt">
            </div>

            <!-- Loader -->
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <div class="loader-text">Analyse psychologique des dialogues en cours...</div>
            </div>

            <!-- Container of Cards generated by Javascript -->
            <div class="cards-container" id="cards-container"></div>
        </div>
        <!-- macOS Window Footer -->
        <div class="window-footer">
            <span>Subtext AI v1.0.0</span>
            <span>Prêt</span>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loader = document.getElementById('loader');
        const cardsContainer = document.getElementById('cards-container');

        let currentFile = null;

        // Drag & Drop event handling
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length) {
                handleFile(files[0]);
            }
        });

        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.name.endsWith('.srt')) {
                alert('Veuillez déposer un fichier avec l\'extension .srt.');
                return;
            }
            currentFile = file;
            document.getElementById('file-name').textContent = file.name;
            document.getElementById('file-name-sub').textContent = `${(file.size / 1024).toFixed(2)} KB`;
            
            // Auto start analysis
            uploadAndAnalyze();
        }

        async function uploadAndAnalyze() {
            if (!currentFile) return;

            // Clear old cards and show loader
            cardsContainer.innerHTML = '';
            loader.style.display = 'flex';
            
            const formData = new FormData();
            formData.append('file', currentFile);
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Erreur inconnue lors de l\'analyse.');
                }

                const data = await response.json();
                displayResults(data);

            } catch (err) {
                alert(`Erreur d'analyse : ${err.message}`);
                document.getElementById('file-name').textContent = 'Déposez votre fichier .srt ici';
                document.getElementById('file-name-sub').textContent = 'ou cliquez pour parcourir les dossiers';
                currentFile = null;
            } finally {
                loader.style.display = 'none';
            }
        }

        function displayResults(data) {
            cardsContainer.innerHTML = '';
            let analysesList = [];
            
            // Extract the core analysis list from response
            let sourceData = data;
            
            // Ollama standard API structure check
            if (data.response) {
                try {
                    sourceData = JSON.parse(data.response.trim());
                } catch (e) {
                    const jsonMatch = data.response.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        try { sourceData = JSON.parse(jsonMatch[0]); } catch (e2) {}
                    }
                }
            }

            // Normalise structural response from FastAPI (data.analysis contains the profile)
            if (sourceData.analysis) {
                if (Array.isArray(sourceData.analysis)) {
                    analysesList = sourceData.analysis;
                } else {
                    analysesList = [sourceData.analysis];
                }
            } else if (sourceData.analyses && Array.isArray(sourceData.analyses)) {
                analysesList = sourceData.analyses;
            } else if (Array.isArray(sourceData)) {
                analysesList = sourceData;
            } else {
                analysesList = [sourceData];
            }

            // Loop to render each card
            analysesList.forEach((profile, index) => {
                const card = createAnalysisCard(profile, index + 1);
                cardsContainer.appendChild(card);
            });
        }

        function createAnalysisCard(profile, index) {
            const card = document.createElement('div');
            card.className = 'analysis-card';

            const emotion = profile.dominant_emotion || 'Inconnue';
            const tension = Math.min(Math.max(parseInt(profile.tension_score) || 0, 0), 10);
            
            // Dynamic color selection for the progress bar
            let tensionColor = 'var(--mac-green)';
            if (tension >= 4 && tension <= 6) {
                tensionColor = 'var(--mac-yellow)';
            } else if (tension >= 7 && tension <= 8) {
                tensionColor = 'var(--mac-orange)';
            } else if (tension >= 9) {
                tensionColor = 'var(--mac-red)';
            }

            // Manipulation status element
            const manipulationClass = profile.manipulation_detected ? 'detected' : 'clean';
            const manipulationText = profile.manipulation_detected ? 'Manipulation détectée' : 'Aucune manipulation';

            // Power dynamics parsing (handle both string and object)
            let powerDynamics = 'Non définie';
            let powerDynamicsTooltip = '';
            if (profile.power_dynamics) {
                if (typeof profile.power_dynamics === 'object') {
                    const who = profile.power_dynamics.who_dominates || '';
                    const reason = profile.power_dynamics.reason || '';
                    powerDynamics = who;
                    powerDynamicsTooltip = reason ? `${who}: ${reason}` : who;
                } else {
                    powerDynamics = profile.power_dynamics;
                    powerDynamicsTooltip = profile.power_dynamics;
                }
            }

            const intention = profile.intention || 'Non spécifiée';

            card.innerHTML = `
                <div class="card-header">
                    <div class="header-left">
                        <div>
                            <h4 class="card-title">Bloc #${index}</h4>
                            <span class="emotion-text">Émotion : ${emotion}</span>
                        </div>
                    </div>
                    <span class="manipulation-badge ${manipulationClass}">${manipulationText}</span>
                </div>
                
                <div class="tension-row">
                    <span class="tension-label">Tension</span>
                    <div class="tension-track">
                        <div class="tension-fill" style="width: ${tension * 10}%; background-color: ${tensionColor}"></div>
                    </div>
                    <span class="tension-num">${tension}/10</span>
                </div>
                
                <div class="badges-row">
                    <div class="badge-item">
                        <span class="badge-label">Dynamique de pouvoir</span>
                        <span class="badge-value val-blue" title="${powerDynamicsTooltip}">${powerDynamics}</span>
                    </div>
                    <div class="badge-item">
                        <span class="badge-label">Intention</span>
                        <span class="badge-value val-purple" title="${intention}">${intention}</span>
                    </div>
                </div>
            `;
            
            return card;
        }
    </script>
</body>
</html>
